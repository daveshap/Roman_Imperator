<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iron Age Agent Battle v4 - Line Command Rewrite</title>
<style>
html,body{margin:0;background:#11100e;color:#eadfc6;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}#wrap{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}canvas{background:#58643d;box-shadow:0 0 0 1px #000,0 22px 70px rgba(0,0,0,.55);cursor:crosshair}.hint{position:absolute;left:14px;bottom:10px;font-size:12px;color:#dac89e;text-shadow:0 1px 2px #000;pointer-events:none;opacity:.9}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="1280" height="820"></canvas><div class="hint">v4 line-command rewrite: Imperator intent → centurion line conference → individual soldiers. Drag select, right-click move, A/H/W/G/S standing orders.</div></div>
<script>
'use strict';
(()=>{
const W=1280,H=820,HUD=64,TAU=Math.PI*2;
const TYPE={
  skirm:{label:'Skirmishers',role:'screen',files:10,ranks:3,slotX:8.8,slotY:9.5,r:2.9,speed:66,unitSpeed:48,gap:48,maxLead:58,contact:44,disc:.42,courage:.46,form:.42,weapon:.35,shield:.25,end:.74,armor:.18,missiles:5,range:145},
  line:{label:'Line Infantry',role:'main',files:15,ranks:5,slotX:7.8,slotY:8.5,r:3.2,speed:49,unitSpeed:36,gap:34,maxLead:24,contact:15,disc:.65,courage:.61,form:.70,weapon:.58,shield:.66,end:.61,armor:.57,missiles:0,range:0},
  reserve:{label:'Veteran Reserve',role:'reserve',files:12,ranks:4,slotX:8.0,slotY:8.6,r:3.25,speed:45,unitSpeed:32,gap:40,maxLead:30,contact:15,disc:.81,courage:.76,form:.83,weapon:.69,shield:.73,end:.66,armor:.64,missiles:0,range:0}
};
const ROLES=['screen','main','reserve'];
const CFG={cell:30,worldPad:12,perception:76,bannerVision:230,officerHearing:125,pressBand:36,pressMax:10,melee:11,collisions:1,combatStep:.085,maxDt:1/25};
let canvas,ctx,seed=0x51a11ce;
function rnd(){seed=(Math.imul(seed,1664525)+1013904223)>>>0;return seed/4294967296}
function gauss(){let u=Math.max(1e-9,rnd()),v=Math.max(1e-9,rnd());return Math.sqrt(-2*Math.log(u))*Math.cos(TAU*v)}
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, hyp=(x,y)=>Math.sqrt(x*x+y*y);
function varied(base,spread,lo=.03,hi=1.05){return clamp(base+gauss()*spread,lo,hi)}
function fwd(side){return -side}                 // blue side=1 goes up/north; red side=-1 goes down/south
function prog(side,y){return fwd(side)*y}        // larger progress = farther toward enemy
function yprog(side,p){return p/fwd(side)}
const S={t:0,paused:false,debug:false,armies:[],units:[],men:[],grid:new Map(),selected:new Set(),drag:null,mouse:{x:0,y:0},nextU:1,nextM:1,combatAcc:0,lossBlue:0,lossRed:0,last:0,orderGroup:1};

function reset(){
  seed=0x51a11ce;S.t=0;S.paused=false;S.armies=[];S.units=[];S.men=[];S.grid.clear();S.selected.clear();S.nextU=1;S.nextM=1;S.combatAcc=0;S.lossBlue=0;S.lossRed=0;S.orderGroup=1;
  const blue=army(1,'Blue Republic','#5fa2ff','#bedcff'),red=army(-1,'Red Republic','#e45b49','#ffc0aa');S.armies.push(blue,red);spawnArmy(blue);spawnArmy(red);buildGrid();diagnostics();
}
function army(side,name,color,light){return{id:side===1?'blue':'red',side,name,color,light,units:[],clock:0,lastPlan:'',reserveCommitted:false}}
function spawnArmy(a){
  const side=a.side,lineY=side===1?638:182,screenY=lineY+fwd(side)*96,resY=lineY-fwd(side)*94,center=W/2,spacing=162;
  for(let i=0;i<5;i++)createUnit(a,'skirm',i,center+(i-2)*spacing,screenY,side===-1?'screen':'hold');
  for(let i=0;i<5;i++)createUnit(a,'line',i,center+(i-2)*spacing,lineY,side===-1?'attack':'hold');
  for(let i=0;i<5;i++)createUnit(a,'reserve',i,center+(i-2)*spacing,resY,'hold');
}
function createUnit(a,type,i,x,y,order){
  const d=TYPE[type],u={id:S.nextU++,army:a,side:a.side,type,role:d.role,def:d,index:i,name:`${a.side===1?'Blue':'Red'} ${d.label} ${i+1}`,files:d.files,ranks:d.ranks,slotX:d.slotX,slotY:d.slotY,width:(d.files-1)*d.slotX+d.r*2,depth:(d.ranks-1)*d.slotY+d.r*2,half:((d.ranks-1)*d.slotY+d.r*2)/2,bx:x,by:y,obx:x,oby:y,ox:x,oy:y+a.side*18,homeX:x,homeY:y,holdX:x,holdY:y,tx:x,ty:y,rawX:x,rawY:y,moveX:x,moveY:y,offX:0,offY:0,order,standing:order,orderVer:1,target:null,left:null,right:null,engaged:false,contact:false,broken:false,coh:1,slotCoh:1,morale:1,alive:0,routing:0,cas:0,fear:.1,fat:.0,pressure:0,enemyPressure:0,note:'',centurion:'',flankL:0,flankR:0,slot:[],men:[]};
  for(let f=0;f<u.files;f++)u.slot[f]=new Array(u.ranks).fill(null);a.units.push(u);S.units.push(u);
  for(let r=0;r<u.ranks;r++)for(let f=0;f<u.files;f++){const p=slotPos(u,f,r),m=createMan(u,f,r,p.x+gauss()*1.1,p.y+gauss()*1.1);u.slot[f][r]=m;u.men.push(m);S.men.push(m)}
}
function createMan(u,file,rank,x,y){
  const d=u.def,vet=u.type==='reserve'?1.12:u.type==='line'?1:.86,con=varied(.72*vet,.11,.32,1.13);
  return{id:S.nextM++,u,army:u.army,side:u.side,type:u.type,file,rank,x,y,vx:0,vy:0,r:d.r*varied(1,.04,.9,1.12),mass:varied(1,.08,.76,1.25),alive:true,dead:false,down:false,routing:false,state:'formed',known:u.order,lastOrder:u.orderVer,clarity:1,health:varied(1,.08,.72,1.18),con,disc:varied(d.disc*vet,.095,.06,.99),courage:varied(d.courage*vet,.1,.06,.99),form:varied(d.form*vet,.1,.05,.99),weapon:varied(d.weapon*vet,.09,.04,.99),shield:varied(d.shield*vet,.09,.03,.99),end:varied(d.end*con,.09,.16,1.08),aggr:varied(.52,.1,.05,.99),react:varied(.62*vet,.11,.14,.99),painTol:varied(.56*vet,.12,.08,.99),clot:varied(.55,.12,.08,.96),vision:varied(1,.1,.72,1.24),hearing:varied(1,.1,.7,1.22),collapse:varied(.74*vet,.09,.42,1.08),fatS:rnd()*.02,fatL:rnd()*.015,pain:0,wound:0,bleed:0,stun:0,fear:varied(.1,.045,0,.28),panic:0,nearF:0,nearE:0,nearR:0,nearD:999,nearId:-1,nextThink:rnd()*.18,atk:rnd()*1.3,jav:d.missiles,slotDist:0,pressure:0,separated:false,note:''}
}
function slotPos(u,file,rank){return{x:u.bx+(file-(u.files-1)/2)*u.slotX,y:u.by+(rank-(u.ranks-1)/2)*u.slotY*u.side}}
const frontY=u=>u.by-u.side*u.half, active=u=>!u.broken&&u.alive>Math.max(8,u.men.length*.18), enemyArmy=a=>S.armies.find(x=>x!==a);

function update(dt){if(S.paused)return;dt=Math.min(dt,CFG.maxDt);S.t+=dt;imperators(dt);centurionConference(dt);for(const u of S.units)moveStandard(u,dt);buildGrid();for(const m of S.men)updateMan(m,dt);for(let i=0;i<CFG.collisions;i++){collisions();buildGrid()}S.combatAcc+=dt;if(S.combatAcc>=CFG.combatStep){combat(S.combatAcc);S.combatAcc=0}diagnostics()}

// 1) Imperator layer: only sets durable intent. It does not micromanage men.
function imperators(dt){
  const red=S.armies[1],blue=S.armies[0];red.clock+=dt;if(red.clock<.45)return;red.clock=0;
  let weak=null,score=-1;for(const u of blue.units){if(u.role!=='main'||!active(u))continue;const sc=(1-u.coh)*1.2+u.cas/u.men.length+u.fear*.45;if(sc>score){score=sc;weak=u}}
  for(const u of red.units){if(!active(u))continue;if(u.role==='screen'){if(u.order!=='screen')orderUnit(u,'screen',null,'screen the army')}
    else if(u.role==='main'){if(u.order!=='attack')orderUnit(u,'attack',null,'main line attack')}
    else{const crisis=red.units.some(x=>x.role==='main'&&(x.engaged&&x.coh<.55||x.cas>x.men.length*.25));if((S.t>30&&red.units.some(x=>x.role==='main'&&x.engaged))||crisis||(weak&&score>.72)){if(u.order!=='attack')orderUnit(u,'attack',weak,'reserve committed to weakness')}else if(u.order!=='hold')orderUnit(u,'hold',null,'reserve held')}}
}

// 2) Centurion-to-centurion layer: each century keeps its place in the battle line.
function centurionConference(dt){for(const a of S.armies)for(const role of ROLES)coordinateLine(a,role)}
function coordinateLine(a,role){
  const line=a.units.filter(u=>u.role===role).sort((p,q)=>p.homeX-q.homeX);for(let i=0;i<line.length;i++){const u=line[i];u.left=line[i-1]||null;u.right=line[i+1]||null;const b=baseTarget(u);u.rawX=b.x;u.rawY=b.y;u.note=b.note;u.contact=b.contact;u.target=b.target||u.target}
  for(const u of line){let x=u.rawX,p=prog(u.side,u.rawY),talk=0;
    for(const n of [u.left,u.right])if(n&&active(n)){talk++;const np=Math.min(prog(u.side,n.by)+u.def.maxLead*.7,prog(u.side,n.rawY)+u.def.maxLead);if(p>np+u.def.maxLead)p=np+u.def.maxLead}
    if(u.left&&active(u.left)){const want=(u.width+u.left.width)/2+Math.max(u.def.gap,u.left.def.gap),actual=u.bx-u.left.bx,err=actual-want;x-=err*(err>0?.35:.23)}
    if(u.right&&active(u.right)){const want=(u.width+u.right.width)/2+Math.max(u.def.gap,u.right.def.gap),actual=u.right.bx-u.bx,err=actual-want;x+=err*(err>0?.35:.23)}
    const fl=flankThreat(u);u.flankL=fl.l;u.flankR=fl.r;if(!u.left&&fl.l)x-=36*fl.l;if(!u.right&&fl.r)x+=36*fl.r;
    u.tx=clamp(x,60,W-60);u.ty=clamp(yprog(u.side,p),HUD+36,H-36);u.centurion=talk?`coordinating with ${talk} neighbor${talk>1?'s':''}`:'edge of line'}
}
function baseTarget(u){
  let x=u.holdX,y=u.holdY,note='hold assigned place',contact=false,target=null;
  if(u.order==='move'){x=u.moveX+u.offX;y=u.moveY+u.offY;note='group move while preserving offsets';if(hyp(u.bx-x,u.by-y)<15)orderUnit(u,'hold',null,'arrived')}
  else if(u.order==='withdraw'){x=u.holdX;y=u.by+u.side*170;note='withdraw by line'}
  else if(u.order==='rally'){x=u.homeX;y=u.homeY;note='rally on original standard'}
  else if(u.order==='screen'){target=findEnemyUnit(u,true);if(target){const ey=frontY(target),gap=112;y=ey+u.side*(u.half+gap);x=u.homeX*.72+target.bx*.28;note='screening at missile distance';const own=frontY(u),fg=u.side===1?own-ey:ey-own;if(fg<70)y+=u.side*50}else{y=u.by+fwd(u.side)*45;note='screening forward'}}
  else if(u.order==='attack'||u.order==='advance'){target=u.target&&active(u.target)?u.target:findEnemyUnit(u,false);if(target){const ey=frontY(target);let gap=u.def.contact;if(target.type==='skirm'&&u.type!=='skirm')gap+=16;if(target.broken||target.routing>target.alive*.35)gap=7;y=ey+u.side*(u.half+gap);x=u.holdX*.84+target.bx*.16;note='standing attack, keep battle-line slot';const own=frontY(u),fg=u.side===1?own-ey:ey-own;contact=fg<CFG.pressBand}else{y=u.by+fwd(u.side)*90;x=u.holdX;note='standing advance, no target in reports'}}
  else{target=findEnemyUnit(u,false);if(target){const ey=frontY(target),own=frontY(u),fg=u.side===1?own-ey:ey-own;if(fg<23)contact=true}}
  return{x,y,note,contact,target}
}
function findEnemyUnit(u,allowSkirm){const e=enemyArmy(u.army);let best=null,bs=1e9;for(const v of e.units){if(!active(v))continue;if(!allowSkirm&&v.type==='skirm'&&e.units.some(x=>x.type!=='skirm'&&active(x)))continue;const dx=Math.abs(v.bx-u.bx),dy=Math.abs(v.by-u.by),bias=(v.role===u.role?-35:0)+(v.role==='main'?-18:0)+(v.role==='reserve'?-8:0);const sc=dx*1.25+dy*.35+bias-(1-v.coh)*22;if(sc<bs){bs=sc;best=v}}return best||(!allowSkirm?findEnemyUnit(u,true):null)}
function flankThreat(u){const e=enemyArmy(u.army);let l=0,r=0;for(const v of e.units){if(!active(v)||Math.abs(v.by-u.by)>205)continue;if(prog(u.side,v.by)<prog(u.side,u.by)-60)continue;if(v.bx<u.bx-u.width/2-70)l=Math.max(l,clamp((u.bx-v.bx-70)/170,0,1));if(v.bx>u.bx+u.width/2+70)r=Math.max(r,clamp((v.bx-u.bx-70)/170,0,1))}return{l,r}}
function moveStandard(u,dt){u.obx=u.bx;u.oby=u.by;let dx=u.tx-u.bx,dy=u.ty-u.by,d=hyp(dx,dy),speed=u.def.unitSpeed*(.42+.58*u.coh)*(1-.30*u.fat);if(u.engaged||u.contact)speed*=.42;if(u.order==='withdraw')speed*=1.15;if(u.order==='rally')speed*=.70;if(!active(u))speed*=.40;if(d>.01){let st=Math.min(d,speed*dt);u.bx+=dx/d*st;u.by+=dy/d*st}if(u.engaged&&active(u)){const yieldAmt=clamp((u.enemyPressure-u.pressure)*.010,-8,8)*dt;u.by+=u.side*yieldAmt;u.holdY+=u.side*yieldAmt*.22}u.ox=lerp(u.ox,u.bx,dt*5);u.oy=lerp(u.oy,u.by+u.side*(u.half+11),dt*5)}

// 3) Centurion-to-soldier layer: men obey slots, neighbors, banner, fear, and pain.
function updateMan(m,dt){if(!m.alive||m.dead)return;if(m.down){m.health-=m.bleed*dt*.012;if(m.health<=0)kill(m,null,'bled out');return}if(m.stun>0)m.stun=Math.max(0,m.stun-dt);if(S.t>=m.nextThink)think(m);deliver(m);bodyMind(m,dt);if(m.routing){route(m,dt);return}const target=desiredPoint(m);steer(m,target,dt)}
function think(m){m.nextThink=S.t+.14+rnd()*.14+(1-m.react)*.06;const seen=query(m.x,m.y,CFG.perception*m.vision,buf1);let f=0,e=0,r=0,bd=1e9,b=null;for(const o of seen){if(o===m||!o.alive||o.dead)continue;const d=(o.x-m.x)**2+(o.y-m.y)**2;if(o.side===m.side){f++;if(o.routing)r++}else{e++;if(d<bd){bd=d;b=o}}}m.nearF=f;m.nearE=e;m.nearR=r;m.nearId=b?b.id:-1;m.nearD=b?Math.sqrt(bd):999;const sp=slotPos(m.u,m.file,m.rank);m.slotDist=hyp(m.x-sp.x,m.y-sp.y);m.separated=m.slotDist>(m.type==='skirm'?42:27)}
function deliver(m){const u=m.u;if(m.lastOrder===u.orderVer)return;const db=hyp(m.x-u.bx,m.y-u.by),doff=hyp(m.x-u.ox,m.y-u.oy);const c=(db<CFG.bannerVision*m.vision?.72:0)+(doff<CFG.officerHearing*m.hearing?.35:0)+(m.nearF>5&&rnd()<.1?.16:0)-m.fear*.2-m.pain*.12;if(c>rnd()*.95){m.known=u.order;m.lastOrder=u.orderVer;m.clarity=clamp(c,.15,1)}}
function bodyMind(m,dt){const u=m.u,sp=hyp(m.vx,m.vy),ex=clamp(sp/u.def.speed,0,1.5),fight=m.nearD<16?1:0;m.fatS=clamp(m.fatS+dt*(ex*.045+fight*.03+m.pressure*.018)/Math.max(.35,m.end)-dt*(fight?.006:.034)*m.end,0,1.35);m.fatL=clamp(m.fatL+dt*m.fatS*.0028,0,.85);if(m.bleed>0){m.health-=dt*m.bleed*.011;m.bleed=Math.max(0,m.bleed-dt*m.clot*.004)}m.pain=clamp(m.pain-dt*.018*m.painTol+m.wound*.001,0,1.25);if(m.health<=0){kill(m,null,'wounds');return}const banner=hyp(m.x-u.bx,m.y-u.by),comfort=banner<CFG.bannerVision*m.vision?.20:0,odds=clamp((m.nearE-m.nearF)/16,-.45,.65),unit=(1-u.coh)*.32+(u.routing/Math.max(1,u.alive))*.35,wound=m.wound*.38+m.pain*.22+m.bleed*.08,fat=m.fatS*.18+m.fatL*.28,iso=m.separated?.18:0,routers=clamp(m.nearR/10,0,.28),calm=m.disc*.22+m.courage*.24+m.form*.10+comfort;let tf=.10+odds+unit+wound+fat+iso+routers-calm;if(u.order==='rally')tf-=.16;if(u.role==='reserve')tf-=.08;m.fear=clamp(lerp(m.fear,tf,.055),0,1.3);const th=m.collapse+m.disc*.18+m.courage*.16-m.wound*.10-m.fatL*.10;if(m.fear>th)m.panic+=dt;else m.panic=Math.max(0,m.panic-dt*.7);if(m.panic>1.25&&!m.routing&&u.order!=='rally')startRoute(m,'panic');if(u.broken&&!m.routing&&rnd()<.003+(1-m.disc)*.012)startRoute(m,'unit broke')}
function desiredPoint(m){const u=m.u;let rank=m.rank;if(m.rank>0&&u.contact&&m.fear<.72&&m.form>.38){const front=u.slot[m.file]?.[m.rank-1];if(!front||!front.alive||front.dead||front.routing||hyp(front.x-m.x,front.y-m.y)>u.slotY*2.4)if(m.rank===1||rnd()<.7)rank=Math.max(0,m.rank-1)}const sp=slotPos(u,m.file,rank);let x=sp.x,y=sp.y,frontish=rank===0||m.rank===0;if((u.order==='attack'||u.order==='advance'||u.contact)&&frontish){const en=nearestEnemy(m,CFG.pressBand+8);if(en){const wantY=en.y+m.side*(m.r+en.r+1.8),p0=prog(m.side,sp.y),p1=prog(m.side,wantY);y=yprog(m.side,clamp(p1,p0,p0+CFG.pressMax));x=lerp(x,en.x,.10+m.aggr*.06)}else if(u.order==='attack'||u.order==='advance')y+=fwd(m.side)*(u.contact?5:2.5)}if(m.known==='withdraw')y+=m.side*22;if(m.known==='rally'||m.separated){x=lerp(x,u.bx,m.separated?.38:.12);y=lerp(y,u.by+m.side*u.half,m.separated?.26:.10)}return{x,y}}
function steer(m,t,dt){const u=m.u;let ax=0,ay=0,dx=t.x-m.x,dy=t.y-m.y;ax+=dx*(u.contact?10:7)*(.38+m.form*.74);ay+=dy*(u.contact?5.8:5.1)*(.36+m.form*.64);const left=m.file>0?u.slot[m.file-1][m.rank]:null,right=m.file<u.files-1?u.slot[m.file+1][m.rank]:null,front=m.rank>0?u.slot[m.file][m.rank-1]:null,rear=m.rank<u.ranks-1?u.slot[m.file][m.rank+1]:null;if(left&&left.alive&&!left.dead&&!left.routing){const e=u.slotX-(m.x-left.x);ax+=e*(u.contact?3.8:2.4)*m.form}if(right&&right.alive&&!right.dead&&!right.routing){const e=u.slotX-(right.x-m.x);ax-=e*(u.contact?3.8:2.4)*m.form}if(front&&front.alive&&!front.dead&&!front.routing){const wy=front.y+m.side*u.slotY;ay+=(wy-m.y)*(u.contact?2.2:1.6)*m.form;const gap=m.side*(m.y-front.y);if(gap<u.slotY*.45)ay+=m.side*(u.slotY*.45-gap)*11.5}if(rear&&rear.alive&&!rear.dead&&!rear.routing){const wy=rear.y-m.side*u.slotY;ay+=(wy-m.y)*.75*m.form}const near=query(m.x,m.y,9.5,buf1);m.pressure=0;for(const o of near){if(o===m||!o.alive||o.dead)continue;let ox=m.x-o.x,oy=m.y-o.y,d=hyp(ox,oy)||.001,min=m.r+o.r+(o.side===m.side?.8:.4);if(d<min){const k=(min-d)/min,mul=o.side===m.side?42:26;ax+=ox/d*k*mul;ay+=oy/d*k*mul;m.pressure+=k}}if(m.stun>0){ax*=.25;ay*=.25}const fatigue=clamp(m.fatS*.38+m.fatL*.36+m.pain*.16+m.wound*.18,0,.75),max=u.def.speed*(.58+m.end*.46)*(1-fatigue);m.vx+=ax*dt;m.vy+=ay*dt;const v=hyp(m.vx,m.vy);if(v>max){m.vx=m.vx/v*max;m.vy=m.vy/v*max}const damp=Math.pow(m.nearD<14?.36:.23,dt);m.vx*=damp;m.vy*=damp;m.x=clamp(m.x+m.vx*dt,CFG.worldPad,W-CFG.worldPad);m.y=clamp(m.y+m.vy*dt,HUD+CFG.worldPad,H-CFG.worldPad)}
function route(m,dt){const speed=72*(.7+m.end*.5)*(1-clamp(m.wound*.35+m.fatL*.25,0,.55)),tx=clamp(m.u.bx+Math.sin(m.id*12.989+S.t*1.7)*18+(m.file-m.u.files/2)*1.5,25,W-25),ty=m.y+m.side*120,dx=tx-m.x,dy=ty-m.y,d=hyp(dx,dy)||1;m.vx=lerp(m.vx,dx/d*speed,.08);m.vy=lerp(m.vy,dy/d*speed,.08);m.x=clamp(m.x+m.vx*dt,CFG.worldPad,W-CFG.worldPad);m.y=clamp(m.y+m.vy*dt,HUD+CFG.worldPad,H-CFG.worldPad);m.fear=Math.max(.35,m.fear-dt*.016);if(m.u.order==='rally'&&hyp(m.x-m.u.bx,m.y-m.u.by)<70&&m.fear<.55&&rnd()<.012*m.disc){m.routing=false;m.state='formed';m.panic=0;m.known='rally'}}
function startRoute(m,why){m.routing=true;m.state='routing';m.note=why;m.fear=Math.max(m.fear,.78);m.vx+=gauss()*16;m.vy+=m.side*(24+rnd()*30)}

const buf1=[],buf2=[];
function buildGrid(){S.grid.clear();const c=CFG.cell;for(const m of S.men){if(!m.alive||m.dead)continue;const ix=Math.floor(m.x/c),iy=Math.floor(m.y/c),k=ix+','+iy;let a=S.grid.get(k);if(!a){a=[];S.grid.set(k,a)}a.push(m)}}
function query(x,y,r,out){out.length=0;const c=CFG.cell,ix0=Math.floor((x-r)/c),ix1=Math.floor((x+r)/c),iy0=Math.floor((y-r)/c),iy1=Math.floor((y+r)/c),rr=r*r;for(let iy=iy0;iy<=iy1;iy++)for(let ix=ix0;ix<=ix1;ix++){const a=S.grid.get(ix+','+iy);if(!a)continue;for(const m of a){const dx=m.x-x,dy=m.y-y;if(dx*dx+dy*dy<=rr)out.push(m)}}return out}
function nearestEnemy(m,r){let best=null,bd=1e9;for(const o of query(m.x,m.y,r,buf2)){if(o.side===m.side||!o.alive||o.dead||o.down)continue;const d=(o.x-m.x)**2+(o.y-m.y)**2;if(d<bd){bd=d;best=o}}return best}
function collisions(){for(const m of S.men){if(!m.alive||m.dead||m.down)continue;for(const o of query(m.x,m.y,8.7,buf1)){if(o.id<=m.id||!o.alive||o.dead||o.down)continue;let dx=o.x-m.x,dy=o.y-m.y,d=hyp(dx,dy)||.001,min=m.r+o.r+(m.side===o.side?.55:.15);if(d>=min)continue;const over=min-d;dx/=d;dy/=d;let sm=.5,so=.5;if(m.routing&&!o.routing){sm=.72;so=.28}else if(o.routing&&!m.routing){sm=.28;so=.72}m.x-=dx*over*sm;m.y-=dy*over*sm;o.x+=dx*over*so;o.y+=dy*over*so}}}
function combat(dt){for(const m of S.men){if(!m.alive||m.dead||m.down||m.routing)continue;m.atk-=dt;if(m.stun>0)continue;const u=m.u;if(u.type==='skirm'&&m.jav>0&&m.atk<=0&&m.nearD<u.def.range&&m.nearD>28){const e=nearestEnemy(m,u.def.range);if(e){const range=clamp(1-m.nearD/u.def.range,.08,.7),hit=.1+m.weapon*.24+m.react*.1+range*.24-e.shield*.1-e.u.coh*.06;if(rnd()<hit)damage(e,m,.16+rnd()*.22,'javelin');m.jav--;m.atk=2+rnd()*1.2;m.fatS+=.018;continue}}
    const e=nearestEnemy(m,CFG.melee+1.8);if(!e)continue;u.engaged=true;if(m.atk>0)continue;const frontish=m.rank===0||m.nearD<8.2||m.separated;if(!frontish&&rnd()>.06)continue;const atk=m.weapon*.46+m.aggr*.2+m.react*.12+gauss()*.10-m.fatS*.2-m.fatL*.18-m.pain*.16-clamp(m.pressure*.1,0,.22),flank=Math.abs(e.x-m.x)>e.u.slotX*1.4?.08:0,def=e.shield*.42+e.react*.13+e.u.coh*.14+e.disc*.08-e.fatS*.14-e.pain*.12-flank,margin=atk-def;if(margin>-.03){const sev=clamp(.06+margin*.36+rnd()*.1,.025,.48);damage(e,m,sev,'melee');m.fatS+=.02+sev*.03;const dx=e.x-m.x,dy=e.y-m.y,d=hyp(dx,dy)||1;e.vx+=dx/d*(10+sev*18);e.vy+=dy/d*(10+sev*18)}else m.fatS+=.013;m.atk=clamp(1.15-m.react*.35-m.weapon*.25+m.fatS*.45+rnd()*.55,.46,2.1)}}
function damage(t,a,sev,kind){if(!t.alive||t.dead)return;const armor=t.u.def.armor*(.55+t.con*.32),mit=sev*(1-armor*.42)*(kind==='javelin'?.85:1);t.wound=clamp(t.wound+mit*.72,0,1.4);t.health-=mit*(.42+rnd()*.18);t.pain=clamp(t.pain+mit*(1.1-t.painTol*.45),0,1.4);t.bleed+=mit*(kind==='javelin'?.16:.10)*(1.05-t.clot*.45);t.fear+=mit*.32;t.stun=Math.max(t.stun,mit>.22?.16+mit*.5:t.stun);if(t.health<=0||(mit>.34&&rnd()<mit*.22)){if(rnd()<.58||t.health<-.08)kill(t,a,kind);else down(t,a,kind)}else if(t.health<.22&&rnd()<.08)down(t,a,kind);for(const o of query(t.x,t.y,30,buf2)){if(o!==t&&o.alive&&!o.dead&&o.side===t.side)o.fear=clamp(o.fear+mit*(o.disc<.5?.08:.045),0,1.3)}}
function kill(t,a,why){t.dead=true;t.alive=false;t.state='dead';t.note=why||'dead';t.vx=t.vy=0}
function down(t,a,why){t.down=true;t.state='down';t.note=why||'down';t.routing=false;t.vx*=.2;t.vy*=.2}
function diagnostics(){S.lossBlue=0;S.lossRed=0;for(const u of S.units){let alive=0,routing=0,dead=0,slotSum=0,fear=0,fat=0,press=0,ep=0,eng=0;for(const m of u.men){if(m.dead||!m.alive||m.down)dead++;else alive++;if(m.routing)routing++;if(m.alive&&!m.dead){const sp=slotPos(u,m.file,m.rank),d=hyp(m.x-sp.x,m.y-sp.y);slotSum+=clamp(d/35,0,1);fear+=m.fear;fat+=clamp(m.fatS*.65+m.fatL*.7,0,1);press+=m.pressure;if(m.nearD<15){ep+=1+clamp(m.pressure,0,2);eng++}}}const tot=u.men.length;u.alive=alive;u.routing=routing;u.cas=dead;u.fear=alive?fear/alive:1;u.fat=alive?fat/alive:1;const disorder=alive?slotSum/alive:1,cas=dead/tot,rout=routing/Math.max(1,alive);u.slotCoh=clamp(1-disorder,0,1);u.coh=clamp(1-disorder*.72-rout*.65-cas*.35-u.fear*.1,0,1);u.morale=clamp(1-u.fear-rout*.45-cas*.25+(u.role==='reserve'?.13:0),0,1.2);u.pressure=alive?press/alive+eng*.012:0;u.enemyPressure=ep/Math.max(1,alive*.18);u.engaged=eng>Math.max(4,alive*.08);u.contact=u.contact||u.engaged;if(!u.broken&&tot>0&&(u.coh<.18||routing>alive*.42||dead>tot*.62)){u.broken=true;u.order='rally';u.standing='rally';u.orderVer++}if(u.broken&&u.coh>.38&&routing<alive*.18&&dead<tot*.55)u.broken=false;if(u.side===1)S.lossBlue+=dead;else S.lossRed+=dead}}
function orderUnit(u,order,target=null,note=''){u.order=order;u.standing=order;u.target=target;u.orderVer++;u.note=note;if(order==='hold'){u.holdX=u.bx;u.holdY=u.by}if(order==='rally'){u.holdX=u.homeX;u.holdY=u.homeY}}
function groupOrder(units,order,point=null){if(!units.length)return;const gx=units.reduce((a,u)=>a+u.bx,0)/units.length,gy=units.reduce((a,u)=>a+u.by,0)/units.length;S.orderGroup++;for(const u of units){if(order==='move'&&point){u.offX=u.bx-gx;u.offY=u.by-gy;u.moveX=point.x;u.moveY=point.y;u.order='move';u.standing='move';u.orderVer++;u.note='group move'}else orderUnit(u,order,null,'imperator order')}}

function draw(){if(!ctx)return;ground();lines();men();banners();selectBox();hud()}
function ground(){const g=ctx.createLinearGradient(0,HUD,0,H);g.addColorStop(0,'#515d3b');g.addColorStop(.55,'#667446');g.addColorStop(1,'#4d5837');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#25221d';ctx.fillRect(0,0,W,HUD);ctx.globalAlpha=.1;ctx.strokeStyle='#f3e2a8';for(let x=80;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,HUD);ctx.lineTo(x,H);ctx.stroke()}for(let y=HUD+70;y<H;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.globalAlpha=1}
function lines(){for(const a of S.armies)for(const role of ROLES){const arr=a.units.filter(u=>u.role===role&&active(u)).sort((p,q)=>p.bx-q.bx);if(arr.length<2)continue;ctx.beginPath();for(let i=0;i<arr.length;i++)i?ctx.lineTo(arr[i].bx,arr[i].by):ctx.moveTo(arr[i].bx,arr[i].by);ctx.strokeStyle=a.side===1?'rgba(90,160,255,.42)':'rgba(230,86,72,.42)';ctx.lineWidth=role==='main'?2.3:1.2;ctx.stroke()}}
function men(){for(const m of S.men){if(m.dead||!m.alive)continue;const u=m.u;let fill=u.army.color;if(m.down)fill='#382f27';else if(m.routing)fill=u.side===1?'#b9c8d7':'#d8b3a8';else if(u.type==='skirm')fill=u.side===1?'#76c8ff':'#ff8d74';else if(u.type==='reserve')fill=u.side===1?'#315dd6':'#b4362e';ctx.globalAlpha=clamp(.38+m.health*.52-m.fear*.12,.25,.95);ctx.fillStyle=fill;ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,TAU);ctx.fill();if(S.debug&&m.fear>.65){ctx.globalAlpha=.8;ctx.strokeStyle='#fff';ctx.lineWidth=.8;ctx.stroke()}}ctx.globalAlpha=1}
function banners(){for(const u of S.units){if(u.alive<=0)continue;const sel=S.selected.has(u.id);if(S.debug||sel){ctx.strokeStyle=sel?'rgba(255,242,150,.95)':u.side===1?'rgba(160,205,255,.24)':'rgba(255,180,150,.24)';ctx.lineWidth=sel?2:1;ctx.strokeRect(u.tx-u.width/2,u.ty-u.half,u.width,u.depth);ctx.beginPath();ctx.moveTo(u.bx,u.by);ctx.lineTo(u.tx,u.ty);ctx.stroke()}ctx.fillStyle=u.army.light;ctx.strokeStyle='#1b1714';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(u.bx,u.by,5.4,0,TAU);ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(u.bx,u.by);ctx.lineTo(u.bx,u.by-u.side*18);ctx.strokeStyle='#201b16';ctx.stroke();ctx.fillStyle=u.army.color;ctx.fillRect(u.bx,u.by-u.side*18,16*(u.side===1?1:-1),-u.side*9);ctx.fillStyle='#f8e6a8';ctx.beginPath();ctx.arc(u.ox,u.oy,4.2,0,TAU);ctx.fill();if(sel){ctx.strokeStyle='#fff0a0';ctx.lineWidth=2;ctx.beginPath();ctx.arc(u.bx,u.by,13,0,TAU);ctx.stroke()}}}
function selectBox(){if(!S.drag||!S.drag.moved)return;const x=Math.min(S.drag.x0,S.drag.x1),y=Math.min(S.drag.y0,S.drag.y1),w=Math.abs(S.drag.x1-S.drag.x0),h=Math.abs(S.drag.y1-S.drag.y0);ctx.fillStyle='rgba(255,240,160,.09)';ctx.strokeStyle='rgba(255,240,160,.9)';ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h)}
function hud(){ctx.fillStyle='#efe2c0';ctx.font='14px system-ui,sans-serif';const sel=selectedUnits(),txt=`Time ${S.t.toFixed(1)}  ${S.paused?'PAUSED':'running'}   Selected: ${sel.length||'none'}   Blue losses ${S.lossBlue} / Red losses ${S.lossRed}`;ctx.fillText(txt,16,22);ctx.font='12px system-ui,sans-serif';ctx.fillStyle='#cdbd94';ctx.fillText('Controls: drag/left-click select, Shift add, right-click move, A standing attack, H hold, W withdraw, G rally, S skirmish, 1/2/3/0 select types/all, D debug, Space pause, R reset.',16,44);if(sel.length){const u=sel[0];ctx.fillStyle='#f5d986';ctx.fillText(`${u.name}: ${u.order.toUpperCase()} | cohesion ${u.coh.toFixed(2)} | morale ${u.morale.toFixed(2)} | ${u.note} | centurion: ${u.centurion}`,16,61)}if(S.debug){const x=W-342,y=12,w=324,h=138;ctx.fillStyle='rgba(20,18,15,.72)';ctx.fillRect(x,y,w,h);ctx.strokeStyle='rgba(255,235,180,.35)';ctx.strokeRect(x,y,w,h);ctx.font='12px ui-monospace,monospace';ctx.fillStyle='#eadbb2';let yy=y+18;ctx.fillText('Hierarchy:',x+10,yy);yy+=18;ctx.fillText('1 imperator: durable standing intent',x+10,yy);yy+=16;ctx.fillText('2 centurions: line conference / gap control',x+10,yy);yy+=16;ctx.fillText('3 soldiers: slots + neighbors + fear',x+10,yy);yy+=20;ctx.fillText(`Blue avg cohesion ${avg(S.armies[0].units.map(u=>u.coh)).toFixed(2)}`,x+10,yy);yy+=16;ctx.fillText(`Red  avg cohesion ${avg(S.armies[1].units.map(u=>u.coh)).toFixed(2)}`,x+10,yy);}}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}

function pt(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
function input(){canvas.addEventListener('contextmenu',e=>e.preventDefault());canvas.addEventListener('mousemove',e=>{const p=pt(e);S.mouse=p;if(S.drag){S.drag.x1=p.x;S.drag.y1=p.y;if(hyp(S.drag.x1-S.drag.x0,S.drag.y1-S.drag.y0)>5)S.drag.moved=true}});canvas.addEventListener('mousedown',e=>{const p=pt(e);if(e.button===2){const su=selectedUnits();if(su.length)groupOrder(su,'move',p);return}if(e.button===0)S.drag={x0:p.x,y0:p.y,x1:p.x,y1:p.y,moved:false,shift:e.shiftKey}});window.addEventListener('mouseup',e=>{if(!S.drag)return;const d=S.drag;S.drag=null;d.moved?selectBoxUnits(d,d.shift):selectAt({x:d.x0,y:d.y0},d.shift)});window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k===' '){S.paused=!S.paused;e.preventDefault()}else if(k==='d')S.debug=!S.debug;else if(k==='r')reset();else if(k==='a')groupOrder(selectedUnits().length?selectedUnits():S.armies[0].units,'attack');else if(k==='h')groupOrder(selectedUnits().length?selectedUnits():S.armies[0].units,'hold');else if(k==='w')groupOrder(selectedUnits().length?selectedUnits():S.armies[0].units,'withdraw');else if(k==='g')groupOrder(selectedUnits().length?selectedUnits():S.armies[0].units,'rally');else if(k==='s')groupOrder(selectedUnits().length?selectedUnits():S.armies[0].units.filter(u=>u.role==='screen'),'screen');else if(k==='0')selectUnits(S.armies[0].units,false);else if(k==='1')selectUnits(S.armies[0].units.filter(u=>u.role==='screen'),false);else if(k==='2')selectUnits(S.armies[0].units.filter(u=>u.role==='main'),false);else if(k==='3')selectUnits(S.armies[0].units.filter(u=>u.role==='reserve'),false)})}
function selectedUnits(){return S.units.filter(u=>S.selected.has(u.id))}function selectUnits(units,add){if(!add)S.selected.clear();for(const u of units)if(u.side===1)S.selected.add(u.id)}
function selectAt(p,add){let best=null,bd=1e9;for(const u of S.units){if(u.side!==1)continue;const d=(u.bx-p.x)**2+(u.by-p.y)**2;if(d<bd){bd=d;best=u}}if(!add)S.selected.clear();if(best&&bd<42*42){if(add&&S.selected.has(best.id))S.selected.delete(best.id);else S.selected.add(best.id)}}
function selectBoxUnits(d,add){const x0=Math.min(d.x0,d.x1),x1=Math.max(d.x0,d.x1),y0=Math.min(d.y0,d.y1),y1=Math.max(d.y0,d.y1);if(!add)S.selected.clear();for(const u of S.units){if(u.side!==1)continue;const l=u.bx-u.width/2,r=u.bx+u.width/2,t=u.by-u.half,b=u.by+u.half;if(r>=x0&&l<=x1&&b>=y0&&t<=y1)S.selected.add(u.id)}}
function loop(now){if(!S.last)S.last=now;const dt=(now-S.last)/1000;S.last=now;update(dt);draw();requestAnimationFrame(loop)}
function init(){canvas=document.getElementById('game');ctx=canvas.getContext('2d');input();reset();selectUnits(S.armies[0].units.filter(u=>u.role==='main'),false);requestAnimationFrame(loop)}
window.__battleTest={reset,update,S,groupOrder,selectedUnits,metrics:()=>({t:S.t,blueLoss:S.lossBlue,redLoss:S.lossRed,blueCoh:avg(S.armies[0].units.map(u=>u.coh)),redCoh:avg(S.armies[1].units.map(u=>u.coh)),contacts:S.units.filter(u=>u.engaged).length,selected:S.selected.size})};
window.addEventListener('load',init);
})();
</script>
