<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>soldier_ABM_v01 — form-up checkpoint</title>
<style>
  :root { color-scheme: dark; --bg:#12141a; --panel:rgba(14,16,22,.9); --line:rgba(255,255,255,.12); --text:#f0ebe3; --muted:#a8a296; --gold:#e9bf62; --blue:#8fd0ff; }
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font:13px/1.35 system-ui, sans-serif; }
  canvas { display:block; width:100vw; height:100vh; cursor:grab; touch-action:none; }
  #hud { position:fixed; top:12px; left:12px; width:300px; max-width:calc(100vw - 24px); border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:12px 14px; backdrop-filter:blur(8px); }
  h1 { margin:0 0 4px; font-size:14px; font-weight:700; }
  p { margin:0 0 10px; color:var(--muted); font-size:11px; }
  .row { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0; }
  button { color:var(--text); background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:8px; padding:7px 10px; font:inherit; font-size:12px; cursor:pointer; }
  button:hover { background:rgba(255,255,255,.14); }
  button.active { border-color:rgba(143,208,255,.6); background:rgba(143,208,255,.14); }
  button.primary { border-color:rgba(233,191,98,.55); background:rgba(233,191,98,.16); }
  label { color:var(--muted); font-size:11px; display:flex; align-items:center; gap:6px; }
  input[type=range] { width:120px; }
  .stat { margin-top:8px; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .stat b { color:var(--gold); font-weight:650; }
  kbd { background:rgba(255,255,255,.1); padding:1px 5px; border-radius:4px; font-size:10px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <h1>soldier_ABM_v01</h1>
  <p>Checkpoint of smooth form-up. Anchor <b>(0,0)</b>. Muster → form → dress. No centurion, no auction.</p>
  <div class="row">
    <button id="btnTriple" class="active">TRIPLE</button>
    <button id="btnRect">RECT</button>
    <button id="btnSquare">SQUARE</button>
  </div>
  <div class="row">
    <button id="btnScatter" class="primary">Scatter</button>
    <button id="btnPause">Pause</button>
  </div>
  <div class="row">
    <label>N <input id="count" type="range" min="12" max="96" step="4" value="36"><span id="countOut">36</span></label>
  </div>
  <div class="row">
    <label>spacing <input id="spacing" type="range" min="1.0" max="2.4" step="0.05" value="1.55"><span id="spOut">1.55</span></label>
  </div>
  <div class="row">
    <label>tempo <input id="tempo" type="range" min="0.25" max="8" step="0.25" value="1"><span id="tempoOut">1×</span></label>
  </div>
  <div class="row">
    <label><input id="showTargets" type="checkbox"> believed spots</label>
  </div>
  <div class="stat">
    shape <b id="shape">triple</b> · speed <b id="spd">—</b><br>
    muster <b id="nMuster">—</b> · form <b id="nForm">—</b> · dress <b id="nDress">—</b><br>
    near post <b id="near">—</b> · holding <b id="hold">—</b><br>
    <span style="opacity:.85">colors: <span style="color:#c48cff">muster</span> · <span style="color:#8fd0ff">form</span> · <span style="color:#5ad4a0">dress</span></span><br>
    <kbd>1</kbd> triple · <kbd>2</kbd> rect · <kbd>3</kbd> square · <kbd>R</kbd> scatter · <kbd>Space</kbd> pause · <kbd>+/−</kbd> tempo
  </div>
</div>
<script>
(() => {
'use strict';

// ——— Canvas / camera ———
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const DPR = Math.min(2, devicePixelRatio || 1);
let W = 1, H = 1;
function resize() {
  W = Math.floor(innerWidth * DPR);
  H = Math.floor(innerHeight * DPR);
  canvas.width = W; canvas.height = H;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener('resize', resize); resize();

// Orbit camera: eye ABOVE ground looking down at target (not under the plane).
const cam = {
  target: { x: 0, y: 0, z: 0 },
  dist: 48,
  yaw: -0.65,
  pitch: 0.62, // elevation angle; ~0 = horizon, ~π/2 = straight down
  eye: { x: 0, y: 0, z: 0 },
  fwd: { x: 0, y: 0, z: 1 },
  right: { x: 1, y: 0, z: 0 },
  up: { x: 0, y: 1, z: 0 },
  f: 900
};
function vsub(a, b) { return { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z }; }
function vdot(a, b) { return a.x * b.x + a.y * b.y + a.z * b.z; }
function vcross(a, b) {
  return { x: a.y * b.z - a.z * b.y, y: a.z * b.x - a.x * b.z, z: a.x * b.y - a.y * b.x };
}
function vnorm(v) {
  const m = Math.hypot(v.x, v.y, v.z) || 1;
  return { x: v.x / m, y: v.y / m, z: v.z / m };
}
function updateCamera() {
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  // Eye sits above the field and looks at target on the ground plane.
  cam.eye.x = cam.target.x + Math.sin(cam.yaw) * cp * cam.dist;
  cam.eye.z = cam.target.z + Math.cos(cam.yaw) * cp * cam.dist;
  cam.eye.y = cam.target.y + sp * cam.dist;
  cam.fwd = vnorm(vsub(cam.target, cam.eye));
  cam.right = vnorm(vcross(cam.fwd, { x: 0, y: 1, z: 0 }));
  cam.up = vnorm(vcross(cam.right, cam.fwd));
  cam.f = Math.min(innerWidth, innerHeight) * 0.95;
}
function project(x, y, z) {
  updateCamera();
  const q = { x: x - cam.eye.x, y: y - cam.eye.y, z: z - cam.eye.z };
  const zc = vdot(q, cam.fwd);
  if (zc < 0.25) return null;
  const scale = cam.f / zc;
  return {
    x: innerWidth * 0.5 + vdot(q, cam.right) * scale,
    y: innerHeight * 0.52 - vdot(q, cam.up) * scale,
    s: scale,
    z: zc
  };
}

// ——— Config (MVP only) ———
const cfg = {
  shape: 'triple',   // triple | rect | square
  count: 36,
  spacing: 1.55,
  bodyR: 0.42,
  facing: 0,         // +Z forward
  senseR: 16,
  press: 6.5,
  sep: 2.8,
  paused: false,
  showTargets: false,
  timeScale: 1
};

// Formation anchor is world origin — not a person
const ANCHOR = { x: 0, z: 0 };

// Per-soldier drill phases (each man decides for himself)
const PHASE = {
  MUSTER: 'muster', // mass near the site
  FORM: 'form',     // occupy ranks/files (mental seats)
  DRESS: 'dress'    // fine place + face
};

// Mental / loco knobs (small fixed set)
const MIND = {
  arrive: 0.32,      // × spacing — on post
  lock: 0.42,
  unlock: 1.35,      // only unlock if really shoved
  seated: 0.42,      // body on cell (my perception)
  // FORM stickiness — stop musical chairs
  claimTimeout: 3.6,       // only abandon after long stuck
  minCommit: 1.4,          // refuse voluntary re-pick for this long
  switchMargin: 2.4,       // need *much* better cell to switch (×spacing)
  rescoreEvery: 0.55,      // re-evaluate less often
  stickBonus: 3.2,         // ×spacing added to current belief score
  approachReserve: 1.65,   // ×spacing: if I see someone closer to a cell, treat reserved
  progressFrac: 0.12,      // claim timeout only if not closing on seat
  // Private phase gates
  musterRadius: 9.0,
  musterInner: 6.5,        // "really at the site"
  musterFriends: 5,
  musterFriendR: 6.5,
  musterHold: 1.15,        // base min time in muster
  formToDressHold: 0.65,
  dressBreak: 2.1,         // ×spacing — only leave dress if badly displaced
  formBreakSite: 18
};
const LOCO = {
  walk: 1.4,
  run: 3.2,
  shuffle: 0.55,
  turn: 4.2,
  moveCommit: 0.35,
  faceAlign: 0.22,
  stopSpeed: 0.06
};

const soldiers = [];
let time = 0;

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }
function dist2(ax, az, bx, bz) { return Math.hypot(ax - bx, az - bz); }
function angleDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}
function facingVectors() {
  const fwd = { x: Math.sin(cfg.facing), z: Math.cos(cfg.facing) };
  const right = { x: Math.cos(cfg.facing), z: -Math.sin(cfg.facing) };
  return { fwd, right };
}

// ——— Doctrine: what the shape *is* (shared idea only) ———
function formationPlan(n) {
  const sp = cfg.spacing;
  if (cfg.shape === 'square') {
    const side = Math.max(1, Math.ceil(Math.sqrt(n)));
    return { cols: side, rows: side };
  }
  if (cfg.shape === 'rect') {
    const aspect = 2.4;
    const cols = Math.max(2, Math.ceil(Math.sqrt(n * aspect)));
    const rows = Math.max(1, Math.ceil(n / cols));
    return { cols, rows };
  }
  // triple: 3 ranks
  const rows = 3;
  const cols = Math.max(1, Math.ceil(n / rows));
  return { cols, rows };
}

/** Ideal cells in formation frame. lat = rank line, dep = file (front = +dep). */
function archetypeSlots(plan, n) {
  const sp = cfg.spacing, { cols, rows } = plan;
  const slots = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      slots.push({
        c, r,
        lat: (c - (cols - 1) * 0.5) * sp,
        dep: ((rows - 1) * 0.5 - r) * sp
      });
    }
  }
  // Keep N cells closest to center of the ideal grid
  if (slots.length > n) {
    slots.sort((a, b) => (a.lat * a.lat + a.dep * a.dep) - (b.lat * b.lat + b.dep * b.dep));
    return slots.slice(0, n);
  }
  while (slots.length < n) {
    const i = slots.length;
    slots.push({ c: i, r: 0, lat: (i - (n - 1) * 0.5) * sp, dep: 0 });
  }
  return slots;
}

function slotWorld(slot, originLat, originDep, fwd, right) {
  const lat = originLat + slot.lat;
  const dep = originDep + slot.dep;
  return {
    x: right.x * lat + fwd.x * dep,
    z: right.z * lat + fwd.z * dep
  };
}

// ——— Soldier ———
function rollPrefs(s) {
  s.prefEdge = rand(-1, 1);
  s.prefFront = rand(-1, 1);
  s.prefDense = rand(-1, 1);
  if (Math.random() < 0.35) s.prefEdge *= 0.35;
  if (Math.random() < 0.35) s.prefFront *= 0.35;
}

function makeSoldier(id, x, z) {
  const s = {
    id, x, z, vx: 0, vz: 0, speed: 0,
    heading: rand(-Math.PI, Math.PI),
    // private drill phase
    drill: PHASE.MUSTER,
    drillTime: 0,
    nearPostTime: 0,
    musterReady: rand(0.0, 0.55), // personal stagger so not everyone forms same frame
    // private mind
    beliefSi: -1,
    targetX: x, targetZ: z,
    slotDist: 0,
    slotLocked: false,
    claimTimer: 0,
    commitTimer: 0,          // how long I've held this belief
    lastSlotDist: 99,
    rescoreT: rand(0, 0.6),  // desync re-picks across the unit
    // local SA (refreshed each mind tick)
    distSite: 0,
    nFriends: 0,
    // prefs
    prefEdge: 0, prefFront: 0, prefDense: 0,
    // motion flags
    needMove: false,
    faceMode: 'unit', // 'unit' | 'travel'
    travelHeading: 0,
    holding: false,
    gait: rand(0, Math.PI * 2)
  };
  rollPrefs(s);
  return s;
}

function spawnField() {
  soldiers.length = 0;
  const n = cfg.count;
  for (let i = 0; i < n; i++) {
    // Scatter around field, not already on 0,0
    const a = rand(0, Math.PI * 2);
    const r = rand(8, 28);
    soldiers.push(makeSoldier(i, Math.cos(a) * r, Math.sin(a) * r));
  }
}

function resetMinds() {
  for (const s of soldiers) {
    s.beliefSi = -1;
    s.slotLocked = false;
    s.claimTimer = 0;
    s.commitTimer = 0;
    s.lastSlotDist = 99;
    s.holding = false;
    s.needMove = false;
    s.targetX = s.x; s.targetZ = s.z;
    s.slotDist = 0;
    s.drill = PHASE.MUSTER;
    s.drillTime = 0;
    s.nearPostTime = 0;
    s.musterReady = rand(0.0, 0.55);
    s.rescoreT = rand(0, 0.6);
  }
}

function setDrill(s, phase) {
  if (s.drill === phase) return;
  s.drill = phase;
  s.drillTime = 0;
  if (phase === PHASE.MUSTER) {
    s.slotLocked = false;
    s.nearPostTime = 0;
    s.beliefSi = -1;
    s.commitTimer = 0;
  }
  if (phase === PHASE.FORM) {
    // Keep existing belief if we fell back from dress; wipe only when coming from muster
    if (s.beliefSi == null) s.beliefSi = -1;
    s.slotLocked = false;
    s.nearPostTime = 0;
    s.claimTimer = 0;
    s.commitTimer = 0;
  }
  if (phase === PHASE.DRESS) {
    s.slotLocked = true;
    s.claimTimer = 0;
  }
}

// ——— Private mental lattice + phase decisions (no global auction / no god phase) ———
// Doctrine: form shape at world (0,0). Same cell geometry for everyone (known site).
// Private: which cell I want, occupancy I *see*, prefs, re-pick, and when to muster/form/dress.
function updateMinds(dt) {
  const n = soldiers.length;
  const plan = formationPlan(n);
  const slots = archetypeSlots(plan, n);
  const nSlots = slots.length;
  const { fwd, right } = facingVectors();
  const sp = cfg.spacing;
  const seatedR = sp * MIND.seated;
  const arriveR = sp * MIND.arrive;
  const lockR = sp * MIND.lock;
  const unlockR = sp * MIND.unlock;
  const margin = sp * MIND.switchMargin;
  const maxLat = Math.max(sp * 0.5, (plan.cols - 1) * sp * 0.5);
  const rows = Math.max(1, plan.rows);

  // Lattice fixed on ANCHOR (0,0) — the experimental constant
  const worlds = new Array(nSlots);
  for (let si = 0; si < nSlots; si++) {
    worlds[si] = slotWorld(slots[si], 0, 0, fwd, right);
  }

  for (const s of soldiers) {
    const sense = cfg.senseR;
    s.drillTime += dt;
    s.distSite = dist2(s.x, s.z, ANCHOR.x, ANCHOR.z);

    // Local SA: friends I can see (for muster decision)
    let nFriends = 0;
    let nNear = 0;
    let comX = 0, comZ = 0;
    for (const o of soldiers) {
      if (o === s) continue;
      const d = dist2(s.x, s.z, o.x, o.z);
      if (d < sense) nNear++;
      if (d < MIND.musterFriendR) {
        nFriends++;
        comX += o.x; comZ += o.z;
      }
    }
    s.nFriends = nFriends;
    if (nFriends > 0) { comX /= nFriends; comZ /= nFriends; }
    else { comX = s.x; comZ = s.z; }

    // ——— Private phase machine ———
    if (s.drill === PHASE.MUSTER) {
      // Stay mustering longer: need to be at the site (inner) with some friends,
      // or clearly at site for a longer personal hold. Staggered per man.
      const holdNeed = MIND.musterHold + s.musterReady;
      const atInner = s.distSite < MIND.musterInner;
      const atOuter = s.distSite < MIND.musterRadius;
      const withFriends = nFriends >= MIND.musterFriends;
      // Early form only if packed at the inner site with friends; outer alone needs longer
      const readyPacked = atInner && withFriends && s.drillTime >= holdNeed;
      const readySolo = atInner && s.drillTime >= holdNeed + 0.9;
      const readyOuter = atOuter && withFriends && s.drillTime >= holdNeed + 0.7;
      if (readyPacked || readySolo || readyOuter) {
        setDrill(s, PHASE.FORM);
        // first seat pick happens below this frame
      }
    } else if (s.drill === PHASE.FORM) {
      if (s.distSite > MIND.formBreakSite) {
        setDrill(s, PHASE.MUSTER);
      } else if (
        s.beliefSi >= 0 &&
        s.nearPostTime >= MIND.formToDressHold &&
        s.speed < 0.35 &&
        s.slotDist < arriveR * 1.15
      ) {
        setDrill(s, PHASE.DRESS);
      }
    } else if (s.drill === PHASE.DRESS) {
      if (s.distSite > MIND.formBreakSite) {
        setDrill(s, PHASE.MUSTER);
      } else if (s.slotDist > sp * MIND.dressBreak) {
        // Keep the same seat belief when falling back — don't wipe identity
        const keep = s.beliefSi;
        setDrill(s, PHASE.FORM);
        s.beliefSi = keep;
      }
    }

    // ——— MUSTER: mass toward site — no seats yet ———
    if (s.drill === PHASE.MUSTER) {
      s.beliefSi = -1;
      s.slotLocked = false;
      s.slotDist = 0;
      s.nearPostTime = 0;
      s.commitTimer = 0;
      const ax = ANCHOR.x * 0.75 + comX * 0.25;
      const az = ANCHOR.z * 0.75 + comZ * 0.25;
      const salt = ((s.id * 17) & 31) - 15;
      const back = sp * (0.8 + (s.id % 5) * 0.4);
      s.targetX = ax + right.x * salt * sp * 0.14 - fwd.x * back * 0.2;
      s.targetZ = az + right.z * salt * sp * 0.14 - fwd.z * back * 0.2;
      continue;
    }

    // Occupancy + "someone closer is heading there" (local reserve — not a global auction)
    const occupied = new Array(nSlots).fill(false);
    const reserved = new Array(nSlots).fill(false); // someone else closer to cell than me
    const density = new Array(nSlots).fill(0);
    const myToCell = new Array(nSlots);
    for (let si = 0; si < nSlots; si++) {
      myToCell[si] = dist2(s.x, s.z, worlds[si].x, worlds[si].z);
    }
    const reserveR = sp * MIND.approachReserve;
    for (const o of soldiers) {
      if (o === s) continue;
      if (dist2(s.x, s.z, o.x, o.z) > sense) continue;
      for (let si = 0; si < nSlots; si++) {
        const dSlot = dist2(o.x, o.z, worlds[si].x, worlds[si].z);
        if (dSlot <= seatedR) occupied[si] = true;
        if (dSlot < sp * 1.85) density[si]++;
        // Local etiquette: if he's clearly closer to that post than I am, leave it
        if (dSlot < reserveR && dSlot + sp * 0.15 < myToCell[si]) {
          reserved[si] = true;
        }
      }
    }

    function scoreCell(si, forSwitch) {
      const w = worlds[si];
      const d = myToCell[si];
      const sl = slots[si];
      let sc = -d;
      // Prefs diversify first picks so not everyone takes the same nearest cell
      const frontness = 1 - (sl.r / Math.max(1, rows - 1));
      sc += s.prefFront * frontness * sp * 2.4;
      const edgeness = Math.abs(sl.lat) / maxLat;
      sc += s.prefEdge * edgeness * sp * 2.2;
      const densN = density[si] / Math.max(1, Math.min(6, n * 0.12));
      sc += s.prefDense * densN * sp * 1.2;
      // Stable personal bias (not random thrash) — spreads the unit without a dispatcher
      const bias = ((s.id * 13 + si * 7) % 11) * sp * 0.08;
      sc += bias * 0.35 * s.prefEdge; // mild

      if (si === s.beliefSi) sc += sp * MIND.stickBonus;

      // Hard avoid: body already sitting there (and it's not me on it)
      if (occupied[si]) {
        const dMe = d;
        if (dMe > seatedR * 0.85) sc -= 1000;
      }
      // Soft avoid: someone closer is approaching — don't herd the same chair
      // (still allow if it's already my committed belief)
      if (reserved[si] && si !== s.beliefSi) sc -= sp * 2.8;
      // Open post lure — empty unreserved cells get a bit of pull so corners fill
      if (!occupied[si] && !reserved[si] && si !== s.beliefSi) sc += sp * 0.55;

      return sc;
    }

    function pickBest(excludeSi) {
      let bestSi = -1, bestSc = -Infinity;
      for (let si = 0; si < nSlots; si++) {
        if (excludeSi != null && si === excludeSi) continue;
        const sc = scoreCell(si, false);
        if (sc > bestSc) { bestSc = sc; bestSi = si; }
      }
      if (bestSc < -500) {
        bestSc = -Infinity;
        for (let si = 0; si < nSlots; si++) {
          if (excludeSi != null && si === excludeSi) continue;
          let sc = -myToCell[si] + (si === s.beliefSi ? sp * MIND.stickBonus : 0);
          // still prefer not occupied
          if (occupied[si] && myToCell[si] > seatedR) sc -= 50;
          if (sc > bestSc) { bestSc = sc; bestSi = si; }
        }
      }
      return bestSi;
    }

    function commit(si, forceWalk) {
      if (si < 0 || si >= nSlots) return;
      const changed = si !== s.beliefSi;
      s.beliefSi = si;
      s.targetX = worlds[si].x;
      s.targetZ = worlds[si].z;
      s.slotDist = dist2(s.x, s.z, s.targetX, s.targetZ);
      if (changed || forceWalk) {
        s.slotLocked = false;
        s.claimTimer = 0;
        s.commitTimer = 0;
        s.lastSlotDist = s.slotDist;
        s.holding = false;
        s.nearPostTime = 0;
        if (s.slotDist > arriveR) {
          s.faceMode = 'travel';
          s.needMove = true;
          s.travelHeading = Math.atan2(s.targetX - s.x, s.targetZ - s.z);
        }
      }
    }

    // ——— DRESS: plant hard — no musical chairs, almost no re-pick ———
    if (s.drill === PHASE.DRESS) {
      if (s.beliefSi < 0 || s.beliefSi >= nSlots) {
        commit(pickBest(null), true);
      } else {
        s.targetX = worlds[s.beliefSi].x;
        s.targetZ = worlds[s.beliefSi].z;
        s.slotDist = dist2(s.x, s.z, s.targetX, s.targetZ);
        s.commitTimer += dt;
        // Only yield if someone is literally on my seat and I'm not
        const taken = occupied[s.beliefSi] && s.slotDist > seatedR * 1.05;
        if (taken) {
          const keep = s.beliefSi;
          commit(pickBest(keep), true);
          setDrill(s, PHASE.FORM);
        } else {
          s.slotLocked = true; // stay committed while dressing
          if (s.slotDist < arriveR * 1.5) s.nearPostTime += dt;
        }
      }
      continue;
    }

    // ——— FORM: sticky seat belief ———
    if (s.beliefSi >= 0 && s.beliefSi < nSlots) {
      s.targetX = worlds[s.beliefSi].x;
      s.targetZ = worlds[s.beliefSi].z;
      s.slotDist = dist2(s.x, s.z, s.targetX, s.targetZ);
      s.commitTimer += dt;

      // Progress toward seat? (for timeout)
      const closing = s.slotDist < s.lastSlotDist - sp * MIND.progressFrac * 0.15;
      if (s.slotDist < s.lastSlotDist) s.lastSlotDist = s.slotDist;

      const takenHard = occupied[s.beliefSi] && s.slotDist > seatedR * 0.95;
      // Unlock only if badly shoved or seat truly stolen
      if (s.slotLocked) {
        if (s.slotDist > unlockR || takenHard) {
          s.slotLocked = false;
          s.nearPostTime = 0;
          if (takenHard) commit(pickBest(s.beliefSi), true);
          else {
            // stay on same belief, just unlock walk
          }
        } else {
          if (s.slotDist < arriveR && s.speed < 0.5) s.nearPostTime += dt;
          else s.nearPostTime = Math.max(0, s.nearPostTime - dt * 0.4);
          continue; // sticky: no rescore while locked near seat
        }
      }

      // Arrived / locking
      if (s.slotDist < lockR && !takenHard) {
        s.slotLocked = true;
        s.claimTimer = 0;
        if (s.slotDist < arriveR && s.speed < 0.5) s.nearPostTime += dt;
        continue;
      }

      // Claim timeout: only if NOT making progress for a long time
      if (s.slotDist < arriveR) {
        s.claimTimer = 0;
      } else if (!closing && s.speed < 0.35) {
        s.claimTimer += dt;
      } else {
        s.claimTimer = Math.max(0, s.claimTimer - dt * 0.35);
      }

      if (takenHard) {
        commit(pickBest(s.beliefSi), true);
      } else if (s.claimTimer >= MIND.claimTimeout && s.commitTimer >= MIND.minCommit) {
        // Abandoned: this seat is a dead end for me
        commit(pickBest(s.beliefSi), true);
      } else if (s.commitTimer >= MIND.minCommit) {
        // Rare voluntary switch — need large score gap + desynced timer
        s.rescoreT -= dt;
        if (s.rescoreT <= 0) {
          s.rescoreT = MIND.rescoreEvery + rand(0, 0.35);
          const cur = scoreCell(s.beliefSi, true);
          const best = pickBest(null);
          if (
            best !== s.beliefSi && best >= 0 &&
            scoreCell(best, true) > cur + sp * MIND.switchMargin
          ) {
            commit(best, true);
          }
        }
      }
      // else: still in minCommit — keep walking to belief, no mind-change
    } else {
      // No belief yet — pick once
      commit(pickBest(null), true);
    }
  }
}

// ——— Physics: desire + headed walk + hard discs ———
function stepSoldier(s, dt) {
  const sp = cfg.spacing;
  const hardR = cfg.bodyR;
  const arriveR = sp * MIND.arrive;
  const drill = s.drill;

  // Separation — looser muster; near-zero in dress when planted (was causing drift)
  let sepX = 0, sepZ = 0;
  const plantDress = drill === PHASE.DRESS && s.slotDist < arriveR * 1.6;
  const softMul = drill === PHASE.MUSTER ? 0.72 : (plantDress ? 0.55 : 1.0);
  for (const o of soldiers) {
    if (o === s) continue;
    const ox = s.x - o.x, oz = s.z - o.z;
    const d = Math.hypot(ox, oz);
    const soft = (hardR * 2 + 0.35) * softMul;
    if (d > 1e-4 && d < soft) {
      const t = (soft - d) / soft;
      // In dress plant: only body-hard push, not soft jostle
      const w = plantDress ? (d < hardR * 2.05 ? 1.2 : 0.15) : 1.0;
      sepX += (ox / d) * t * t * w;
      sepZ += (oz / d) * t * t * w;
    }
  }

  let dx = 0, dz = 0;
  const gx = s.targetX - s.x, gz = s.targetZ - s.z;
  const gd = Math.hypot(gx, gz) || 1;

  if (drill === PHASE.MUSTER) {
    const k = cfg.press * (s.distSite > 14 ? 1.15 : 0.7);
    dx += (gx / gd) * k;
    dz += (gz / gd) * k;
  } else if (drill === PHASE.FORM) {
    const onPost = s.slotDist < arriveR || (s.slotLocked && s.slotDist < sp * MIND.lock);
    if (!onPost) {
      const k = cfg.press * (s.slotDist > sp * 2 ? 1.05 : 0.6);
      dx += (gx / gd) * k;
      dz += (gz / gd) * k;
    } else if (s.slotDist > 0.06) {
      dx += gx * cfg.press * 0.16;
      dz += gz * cfg.press * 0.16;
    }
  } else {
    // DRESS: strong magnet back to seat; no wander
    if (s.slotDist > 0.04) {
      dx += gx * cfg.press * 0.35;
      dz += gz * cfg.press * 0.35;
    }
  }

  const sepGain = drill === PHASE.MUSTER ? 0.75 : (plantDress ? 0.35 : 1.0);
  dx += sepX * cfg.sep * sepGain;
  dz += sepZ * cfg.sep * sepGain;

  const mag = Math.hypot(dx, dz);
  const onPost = drill !== PHASE.MUSTER && (
    s.slotDist < arriveR || (s.slotLocked && s.slotDist < sp * MIND.lock)
  );

  // Face + move
  if (drill === PHASE.DRESS) {
    s.faceMode = 'unit';
    // Only shuffle if off seat; never travel-face while dressing
    s.needMove = s.slotDist > 0.12 && mag > 0.08;
    s.holding = s.slotDist < arriveR * 1.25 && s.speed < 0.22;
    if (s.needMove) s.travelHeading = Math.atan2(dx, dz);
  } else if (onPost && mag < LOCO.moveCommit * 1.2) {
    s.faceMode = 'unit';
    s.needMove = false;
    s.holding = s.slotDist < arriveR * 1.15 && s.speed < 0.25;
  } else if (mag >= LOCO.moveCommit) {
    s.faceMode = 'travel';
    s.needMove = true;
    s.holding = false;
    s.travelHeading = Math.atan2(dx, dz);
  } else {
    s.needMove = false;
    s.holding = onPost;
    s.faceMode = onPost ? 'unit' : 'travel';
  }

  const wantH = (s.faceMode === 'travel' && s.needMove) ? s.travelHeading : cfg.facing;
  const err = angleDiff(wantH, s.heading);
  const turnStep = LOCO.turn * dt;
  if (Math.abs(err) <= turnStep) s.heading = wantH;
  else s.heading += clamp(err, -turnStep, turnStep);

  let intent = 0;
  if (s.needMove) {
    if (drill === PHASE.MUSTER) {
      intent = s.distSite > 12 ? LOCO.run : LOCO.walk;
    } else if (drill === PHASE.DRESS) {
      intent = Math.min(LOCO.shuffle * 0.7, s.slotDist * 1.8);
    } else {
      if (s.slotDist > sp * 4) intent = LOCO.run;
      else if (s.slotDist > sp * 1.2) intent = LOCO.walk;
      else intent = LOCO.shuffle;
    }
    const align = Math.cos(angleDiff(wantH, s.heading));
    if (align < 0.3) intent *= 0.15;
    else intent *= clamp(align, 0.2, 1);
  }

  const hf = Math.sin(s.heading), hz = Math.cos(s.heading);
  let desVx = hf * intent, desVz = hz * intent;

  // Dress plant: allow tiny lateral correction toward seat without spinning
  if (drill === PHASE.DRESS && s.needMove && s.slotDist < sp * 0.9) {
    desVx = gx * Math.min(1.1, intent / Math.max(0.01, s.slotDist));
    desVz = gz * Math.min(1.1, intent / Math.max(0.01, s.slotDist));
    const sm = Math.hypot(desVx, desVz);
    if (sm > LOCO.shuffle) {
      desVx *= LOCO.shuffle / sm;
      desVz *= LOCO.shuffle / sm;
    }
  }

  const a = (intent > s.speed ? 5.0 : 7.0) * dt;
  const evx = desVx - s.vx, evz = desVz - s.vz;
  const em = Math.hypot(evx, evz);
  if (em > a && em > 1e-8) {
    s.vx += (evx / em) * a;
    s.vz += (evz / em) * a;
  } else {
    s.vx = desVx; s.vz = desVz;
  }

  if (drill === PHASE.DRESS && plantDress) {
    // Kill residual drift when on post
    if (!s.needMove || s.slotDist < 0.1) {
      s.vx *= Math.exp(-14 * dt);
      s.vz *= Math.exp(-14 * dt);
    }
  } else if (intent > 0.05 && !(drill === PHASE.DRESS && s.slotDist < sp * 0.9)) {
    const rf = Math.cos(s.heading), rz = -Math.sin(s.heading);
    const vFwd = s.vx * hf + s.vz * hz;
    let vLat = s.vx * rf + s.vz * rz;
    vLat *= Math.exp(-8 * dt);
    s.vx = hf * Math.max(0, vFwd) + rf * vLat;
    s.vz = hz * Math.max(0, vFwd) + rz * vLat;
  }
  if (intent < 0.02) {
    s.vx *= Math.exp(-10 * dt);
    s.vz *= Math.exp(-10 * dt);
  }

  s.speed = Math.hypot(s.vx, s.vz);
  if (drill === PHASE.DRESS && s.speed < LOCO.stopSpeed && s.slotDist < 0.1) {
    s.vx = 0; s.vz = 0; s.speed = 0;
  }
  s.x += s.vx * dt;
  s.z += s.vz * dt;
  s.gait += dt * (4 + s.speed * 2.5);
}

function resolveCollisions() {
  const r = cfg.bodyR * 2;
  for (let iter = 0; iter < 4; iter++) {
    for (let i = 0; i < soldiers.length; i++) {
      for (let j = i + 1; j < soldiers.length; j++) {
        const a = soldiers[i], b = soldiers[j];
        const dx = b.x - a.x, dz = b.z - a.z;
        const d = Math.hypot(dx, dz);
        if (d < r && d > 1e-6) {
          const push = (r - d) * 0.5;
          const ux = dx / d, uz = dz / d;
          a.x -= ux * push; a.z -= uz * push;
          b.x += ux * push; b.z += uz * push;
          // kill inward velocity
          const va = a.vx * ux + a.vz * uz;
          const vb = b.vx * ux + b.vz * uz;
          if (va > 0) { a.vx -= ux * va; a.vz -= uz * va; }
          if (vb < 0) { b.vx -= ux * vb; b.vz -= uz * vb; }
        }
      }
    }
  }
}

// ——— Render ———
function drawGround() {
  // origin cross
  const o = project(0, 0, 0);
  if (o) {
    ctx.save();
    ctx.strokeStyle = 'rgba(233,191,98,.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(o.x - 10, o.y); ctx.lineTo(o.x + 10, o.y);
    ctx.moveTo(o.x, o.y - 10); ctx.lineTo(o.x, o.y + 10);
    ctx.stroke();
    ctx.fillStyle = 'rgba(233,191,98,.85)';
    ctx.font = '11px system-ui';
    ctx.fillText('(0,0)', o.x + 12, o.y - 8);
    ctx.restore();
  }
  // light grid
  ctx.save();
  for (let g = -30; g <= 30; g += 5) {
    const a1 = project(g, 0, -30), a2 = project(g, 0, 30);
    const b1 = project(-30, 0, g), b2 = project(30, 0, g);
    ctx.strokeStyle = g === 0 ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.05)';
    ctx.lineWidth = 1;
    if (a1 && a2) { ctx.beginPath(); ctx.moveTo(a1.x, a1.y); ctx.lineTo(a2.x, a2.y); ctx.stroke(); }
    if (b1 && b2) { ctx.beginPath(); ctx.moveTo(b1.x, b1.y); ctx.lineTo(b2.x, b2.y); ctx.stroke(); }
  }
  ctx.restore();
}

function drawSoldier(s) {
  const p = project(s.x, 0, s.z);
  if (!p) return;
  // phase colors (primary); holding brightens dress slightly
  let col = '#8fd0ff';
  if (s.drill === PHASE.MUSTER) col = '#c48cff';
  else if (s.drill === PHASE.FORM) col = s.needMove ? '#8fd0ff' : '#6eb8e8';
  else col = s.holding ? '#5ad4a0' : '#7ddea8';
  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(p.x, p.y, Math.max(2.5, cfg.bodyR * p.s * 0.55), 0, Math.PI * 2);
  ctx.fill();
  // heading tick
  const hf = Math.sin(s.heading), hz = Math.cos(s.heading);
  const tip = project(s.x + hf * 0.7, 0.1, s.z + hz * 0.7);
  if (tip) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawTargets() {
  if (!cfg.showTargets) return;
  for (const s of soldiers) {
    if (s.drill === PHASE.MUSTER || s.beliefSi < 0) continue;
    const p = project(s.targetX, 0.05, s.targetZ);
    const m = project(s.x, 0.1, s.z);
    if (!p || !m) continue;
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#8fd0ff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(143,208,255,.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.restore();
  }
}

function render() {
  ctx.fillStyle = '#12141a';
  ctx.fillRect(0, 0, innerWidth, innerHeight);
  // sky fade
  const g = ctx.createLinearGradient(0, 0, 0, innerHeight * 0.5);
  g.addColorStop(0, '#1a2030');
  g.addColorStop(1, '#12141a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, innerWidth, innerHeight * 0.55);

  drawGround();
  drawTargets();
  // depth sort
  const order = soldiers.map(s => ({ s, p: project(s.x, 0, s.z) })).filter(o => o.p);
  order.sort((a, b) => b.p.z - a.p.z);
  for (const o of order) drawSoldier(o.s);
}

function updateHud() {
  const n = soldiers.length || 1;
  let spSum = 0, near = 0, hold = 0;
  let nMuster = 0, nForm = 0, nDress = 0;
  const arriveR = cfg.spacing * MIND.arrive;
  for (const s of soldiers) {
    spSum += s.speed;
    if (s.drill !== PHASE.MUSTER && s.slotDist < arriveR * 1.2) near++;
    if (s.holding) hold++;
    if (s.drill === PHASE.MUSTER) nMuster++;
    else if (s.drill === PHASE.FORM) nForm++;
    else nDress++;
  }
  document.getElementById('shape').textContent = cfg.shape;
  document.getElementById('spd').textContent = (spSum / n).toFixed(2);
  document.getElementById('near').textContent = Math.round(100 * near / n) + '%';
  document.getElementById('hold').textContent = Math.round(100 * hold / n) + '%';
  document.getElementById('nMuster').textContent = nMuster;
  document.getElementById('nForm').textContent = nForm;
  document.getElementById('nDress').textContent = nDress;
}

// ——— Loop ———
function step(dt) {
  updateMinds(dt);
  for (const s of soldiers) stepSoldier(s, dt);
  resolveCollisions();
}

let last = performance.now();
function loop(now) {
  const raw = Math.min(0.05, (now - last) / 1000);
  last = now;
  if (!cfg.paused) {
    // Substep so high tempo stays stable (max ~1/30s sim per substep)
    let budget = raw * cfg.timeScale;
    time += budget;
    const maxSub = 1 / 30;
    while (budget > 1e-6) {
      const dt = Math.min(maxSub, budget);
      step(dt);
      budget -= dt;
    }
  }
  render();
  updateHud();
  requestAnimationFrame(loop);
}

// ——— UI ———
function setShape(shape) {
  cfg.shape = shape;
  document.getElementById('btnTriple').classList.toggle('active', shape === 'triple');
  document.getElementById('btnRect').classList.toggle('active', shape === 'rect');
  document.getElementById('btnSquare').classList.toggle('active', shape === 'square');
  resetMinds();
}

document.getElementById('btnTriple').onclick = () => setShape('triple');
document.getElementById('btnRect').onclick = () => setShape('rect');
document.getElementById('btnSquare').onclick = () => setShape('square');
document.getElementById('btnScatter').onclick = () => { spawnField(); resetMinds(); };
document.getElementById('btnPause').onclick = () => {
  cfg.paused = !cfg.paused;
  document.getElementById('btnPause').textContent = cfg.paused ? 'Resume' : 'Pause';
};
document.getElementById('count').oninput = e => {
  cfg.count = Number(e.target.value);
  document.getElementById('countOut').textContent = String(cfg.count);
  spawnField(); resetMinds();
};
document.getElementById('spacing').oninput = e => {
  cfg.spacing = Number(e.target.value);
  document.getElementById('spOut').textContent = cfg.spacing.toFixed(2);
  resetMinds();
};
document.getElementById('showTargets').onchange = e => { cfg.showTargets = e.target.checked; };
document.getElementById('tempo').oninput = e => {
  cfg.timeScale = Number(e.target.value);
  document.getElementById('tempoOut').textContent = cfg.timeScale.toFixed(2).replace(/\.?0+$/, '') + '×';
};

addEventListener('keydown', e => {
  if (e.key === '1') setShape('triple');
  if (e.key === '2') setShape('rect');
  if (e.key === '3') setShape('square');
  if (e.key === 'r' || e.key === 'R') { spawnField(); resetMinds(); }
  if (e.key === ' ') { e.preventDefault(); document.getElementById('btnPause').click(); }
  if (e.key === '+' || e.key === '=') {
    const el = document.getElementById('tempo');
    el.value = String(Math.min(8, Number(el.value) + 0.25));
    el.dispatchEvent(new Event('input'));
  }
  if (e.key === '-' || e.key === '_') {
    const el = document.getElementById('tempo');
    el.value = String(Math.max(0.25, Number(el.value) - 0.25));
    el.dispatchEvent(new Event('input'));
  }
});

// simple orbit
let drag = null, lx = 0, ly = 0;
canvas.addEventListener('pointerdown', e => {
  drag = true; lx = e.clientX; ly = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointerup', () => { drag = false; });
canvas.addEventListener('pointermove', e => {
  if (!drag) return;
  const dx = e.clientX - lx, dy = e.clientY - ly;
  lx = e.clientX; ly = e.clientY;
  cam.yaw -= dx * 0.006;
  cam.pitch = clamp(cam.pitch + dy * 0.004, 0.18, 1.35);
});
canvas.addEventListener('wheel', e => {
  cam.dist = clamp(cam.dist + e.deltaY * 0.03, 16, 100);
  e.preventDefault();
}, { passive: false });

// boot
spawnField();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
